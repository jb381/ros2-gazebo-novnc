name: Build and Push Image

on:
  push:
    branches: [master]
    tags: ["v*"]
  pull_request:
    branches: [master]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        include:
          - ros_distro: jazzy
            base_image: ubuntu:24.04
            tag_suffix: ""
          - ros_distro: humble
            base_image: ubuntu:22.04
            tag_suffix: "-humble"

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Load CI build config
        id: config
        run: |
          ADDITIONAL_PACKAGES="${{ vars.ADDITIONAL_PACKAGES }}"
          WORKSPACE_REPOS="${{ vars.WORKSPACE_REPOS }}"
          if [ -z "${ADDITIONAL_PACKAGES}" ]; then
            ADDITIONAL_PACKAGES=$(grep '^ADDITIONAL_PACKAGES=' .env.ci.${{ matrix.ros_distro }} | cut -d= -f2-)
          fi
          if [ -z "${WORKSPACE_REPOS}" ]; then
            WORKSPACE_REPOS=$(grep '^WORKSPACE_REPOS=' .env.ci.${{ matrix.ros_distro }} | cut -d= -f2-)
          fi
          echo "additional_packages=${ADDITIONAL_PACKAGES}" >> "$GITHUB_OUTPUT"
          echo "workspace_repos=${WORKSPACE_REPOS}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          flavor: latest=${{ matrix.ros_distro == 'jazzy' && 'auto' || 'false' }}
          tags: |
            type=ref,event=branch,suffix=${{ matrix.tag_suffix }}
            type=ref,event=pr,suffix=${{ matrix.tag_suffix }}
            type=semver,pattern={{version}},suffix=${{ matrix.tag_suffix }}
            type=semver,pattern={{major}}.{{minor}},suffix=${{ matrix.tag_suffix }}
            type=sha,suffix=${{ matrix.tag_suffix }}
            type=raw,value=${{ matrix.ros_distro }},enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            BASE_IMAGE=${{ matrix.base_image }}
            ROS_DISTRO=${{ matrix.ros_distro }}
            ADDITIONAL_PACKAGES=${{ steps.config.outputs.additional_packages }}
            WORKSPACE_REPOS=${{ steps.config.outputs.workspace_repos }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
