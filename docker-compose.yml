services:
  gazebo-ros2:
    build:
      context: .
      dockerfile: docker/Dockerfile
      args:
        ROS_DISTRO: jazzy
        ADDITIONAL_PACKAGES: "${ADDITIONAL_PACKAGES:-}"
        WORKSPACE_REPOS: "${WORKSPACE_REPOS:-}"
    image: gazebo-ros2:jazzy
    container_name: gazebo-ros2
    restart: unless-stopped
    shm_size: "1gb"
    security_opt:
      - seccomp=unconfined
    environment:
      - VNC_GEOMETRY=${VNC_GEOMETRY:-1920x1080}
      - VNC_PASSWORD=${VNC_PASSWORD:-ubuntu}
      - ROS_DOMAIN_ID=${ROS_DOMAIN_ID:-30}
    ports:
      - "${PORT:-6080}:80"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:80/"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3

  gazebo-ros2-humble:
    profiles: ["humble"]
    build:
      context: .
      dockerfile: docker/Dockerfile
      args:
        BASE_IMAGE: ubuntu:22.04
        ROS_DISTRO: humble
        ROS_GZ_PACKAGE: ""
        ADDITIONAL_PACKAGES: "${ADDITIONAL_PACKAGES_HUMBLE:-}"
        WORKSPACE_REPOS: "${WORKSPACE_REPOS_HUMBLE:-}"
    image: gazebo-ros2:humble
    container_name: gazebo-ros2-humble
    restart: unless-stopped
    shm_size: "1gb"
    security_opt:
      - seccomp=unconfined
    environment:
      - VNC_GEOMETRY=${VNC_GEOMETRY:-1920x1080}
      - VNC_PASSWORD=${VNC_PASSWORD:-ubuntu}
      - ROS_DOMAIN_ID=${ROS_DOMAIN_ID:-30}
    ports:
      - "${PORT_HUMBLE:-6081}:80"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:80/"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
